<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<meta name="description" content="NEXUS — broadcast-grade WebGL live visual engine: audio-reactive 3D, multi-scene morphs, venue mode.">
<title>NEXUS MARK IV — Live Visual Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:1}
#splash{position:fixed;inset:0;z-index:80;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .9s}
#splash.out{opacity:0;pointer-events:none}
.sl{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(36px,9vw,120px);letter-spacing:.12em;color:#fff;text-shadow:0 0 80px rgba(0,229,255,.6);margin-bottom:4px}
.ss{font-size:10px;letter-spacing:.5em;color:rgba(255,255,255,.18);text-transform:uppercase;margin-bottom:50px}
.sb{font-family:'Orbitron';font-weight:700;font-size:11px;letter-spacing:.3em;padding:14px 48px;border:1px solid rgba(0,229,255,.5);background:rgba(0,229,255,.06);color:#00e5ff;cursor:pointer;position:relative;overflow:hidden;clip-path:polygon(12px 0,100% 0,calc(100% - 12px) 100%,0 100%);transition:color .2s}
.sb::before{content:'';position:absolute;inset:0;background:#00e5ff;transform:scaleX(0);transform-origin:left;transition:transform .2s}
.sb:hover{color:#000}.sb:hover::before{transform:scaleX(1)}
.sb span{position:relative;z-index:1}
.sn{font-size:9px;color:rgba(255,255,255,.12);letter-spacing:.14em;margin-top:14px;text-transform:uppercase}
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;padding:16px 20px;display:flex;flex-direction:column;justify-content:space-between;transition:opacity .5s}
#hud.hide{opacity:0}
.ht{display:flex;justify-content:space-between}
.hb{display:flex;justify-content:space-between;align-items:flex-end}
.brand{font-family:'Orbitron';font-weight:900;font-size:11px;letter-spacing:.28em;color:rgba(255,255,255,.5)}
.bsub{font-size:8px;letter-spacing:.18em;color:rgba(255,255,255,.12);margin-top:2px}
.meters{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.mr{display:flex;align-items:center;gap:6px;font-size:8px;letter-spacing:.1em;color:rgba(255,255,255,.2)}
.mbar{width:50px;height:1px;background:rgba(255,255,255,.07)}
.mfill{height:100%;transition:width .04s}
.mvl{font-family:'Orbitron';font-size:7px;min-width:18px;text-align:right;color:rgba(255,255,255,.35)}
.pc{text-align:center}
.pname{font-family:'Orbitron';font-weight:900;font-size:clamp(9px,1.8vw,20px);letter-spacing:.22em;color:rgba(255,255,255,.9);text-shadow:0 0 25px rgba(0,229,255,.65);opacity:0;transition:opacity .4s}
.pidx{font-size:8px;letter-spacing:.3em;color:#00e5ff;opacity:0;transition:opacity .4s;margin-top:2px}
.hs{font-family:'Orbitron';font-size:8px;letter-spacing:.15em;color:rgba(255,255,255,.2)}
.hs b{color:#00e5ff}
#panel{position:fixed;bottom:0;left:0;right:0;z-index:20;background:linear-gradient(transparent,rgba(0,0,0,.97) 40%);padding:8px 16px 10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;transition:transform .4s,opacity .4s}
#panel.hide{transform:translateY(110%);opacity:0;pointer-events:none}
.btn{font-family:'Rajdhani';font-weight:600;font-size:9px;letter-spacing:.14em;padding:5px 11px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.04);color:rgba(255,255,255,.45);cursor:pointer;transition:all .15s;text-transform:uppercase;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);flex-shrink:0;user-select:none}
.btn:hover{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.28)}
.btn.on{border-color:rgba(0,229,255,.5);color:#00e5ff;background:rgba(0,229,255,.07)}
.btn.ex{border-color:rgba(255,80,0,.55);color:#ff5000}
.sep{width:1px;height:18px;background:rgba(255,255,255,.07);flex-shrink:0}
.kn{display:flex;align-items:center;gap:4px;flex-shrink:0}
.kn label{font-size:8px;letter-spacing:.12em;color:rgba(255,255,255,.2);text-transform:uppercase;white-space:nowrap}
input[type=range]{-webkit-appearance:none;width:50px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:9px;height:9px;border-radius:50%;background:#00e5ff;cursor:pointer}
.swrow{display:flex;gap:4px;align-items:center}
.sw{width:12px;height:12px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.sw.on{border-color:#fff;transform:scale(1.3)}
#ipanel{position:fixed;bottom:50px;left:8px;z-index:30;background:rgba(5,5,9,.97);border:1px solid rgba(255,255,255,.13);padding:14px;width:240px;border-radius:5px;display:none;flex-direction:column;gap:10px}
#ipanel.open{display:flex}
.ipt{font-family:'Orbitron';font-size:9px;letter-spacing:.2em;color:#00e5ff}
.ipr{display:flex;align-items:center;justify-content:space-between}
.ipr label{font-size:10px;color:rgba(255,255,255,.4)}
.ipr input[type=range]{width:85px}
.ipsel{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.13);color:#fff;font-size:9px;padding:4px 7px;border-radius:3px;font-family:'Rajdhani';margin-top:4px}
.tog{width:32px;height:16px;background:rgba(255,255,255,.1);border-radius:8px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:rgba(0,229,255,.3)}
.tog::after{content:'';position:absolute;width:10px;height:10px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .18s}
.tog.on::after{left:19px}
.lvl{height:2px;background:rgba(255,255,255,.07);border-radius:1px;overflow:hidden;margin-top:5px}
.lvlf{height:100%;background:#00e5ff;width:0%;transition:width .05s}
.dbadge{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:15;font-family:'Orbitron';font-size:8px;letter-spacing:.25em;color:rgba(255,200,0,.5);text-transform:uppercase;pointer-events:none;transition:opacity .4s}
.dbadge.h{opacity:0}
/* Venue / broadcast: hide chrome, optional cursor */
body.nexus-present #hud,body.nexus-present #panel,body.nexus-present #ipanel,body.nexus-present #db{opacity:0!important;pointer-events:none!important;transition:opacity .45s ease}
body.nexus-present #fpsBadge{opacity:.25}
body.nexus-present{cursor:none}
#fpsBadge{position:fixed;top:10px;right:12px;z-index:90;font-family:Orbitron,monospace;font-size:8px;letter-spacing:.14em;color:rgba(0,229,255,.4);pointer-events:none;display:none;white-space:pre;text-align:right}
#fpsBadge.on{display:block}
#presentHint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:90;font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.18);opacity:0;transition:opacity .35s;pointer-events:none}
body.nexus-present:hover #presentHint{opacity:1}
</style>
</head>
<body>

</div>

  <div class="ht">
    <div><div class="brand">NEXUS MARK IV</div><div class="bsub">SPECTRAL VISUAL ENGINE · v4</div></div>
    <div class="meters">
      <div class="mr">BASS<div class="mbar"><div class="mfill" id="mb" style="width:0%;background:#00e5ff"></div></div><span class="mvl" id="vb">0</span></div>

<script>
'use strict';
// ===================================================================
// NEXUS v3 - Professional Live Visual Engine
// Architecture: each scene = unique full 3D raymarched world
// Render pipeline: Scene -> Bloom -> Feedback -> ACES Output
// No split lines. Demo mode always active. GPU particles overlay.
// ===================================================================
var C=document.getElementById('c');
var gl=C.getContext('webgl',{antialias:false,alpha:false,powerPreference:'high-performance'})
      ||C.getContext('experimental-webgl',{antialias:false,alpha:false});
if(!gl){alert('WebGL required - use Chrome or Safari.');throw 0;}
gl.getExtension('OES_texture_float');

var W=0,H=0,FW=0,FH=0,GT=0,frame=0,hudTick=0;
var mouseRaw=[0,0],mouseSmooth=[0,0];
var SPD=5,RCT=7,WRP=5,PAL=0;
var GAIN=1.0,SMTH=58;
(function(){var e=document.getElementById('rsmth');if(e)SMTH=+e.value;})();
var sBass=0,sMid=0,sHigh=0,sSub=0,sVol=0,sFlux=0,sCent=0.35;
var prevFreqFlux=null;
var prevBass=0,prevMbRaw=0,bpmList=[],lastBeat=0,bpm=0,beat=0,explode=0;
var _lastAudT=0;
var micOn=false,analyser=null,waveArr,freqArr,bufLen=0;
var audioCtx=null,micStream=null,gainNode=null,curDev='';

// Resize (maxDpr + renderScale — both applied only here or via rebuildFBOs for scale-only)
var rawW=0,rawH=0;
var maxDpr=2;
var renderScale=0.78;
var pendingRenderScale=null;
function resize(){
  var dpr=Math.min(window.devicePixelRatio||1,maxDpr);
  W=innerWidth;H=innerHeight;
  C.width=Math.floor(W*dpr);C.height=Math.floor(H*dpr);
  C.style.width=W+'px';C.style.height=H+'px';
  rawW=C.width;rawH=C.height;
  if(pendingRenderScale!=null){
    renderScale=pendingRenderScale;
    pendingRenderScale=null;
  }
  FW=Math.max(1,Math.floor(rawW*renderScale));
  FH=Math.max(1,Math.floor(rawH*renderScale));
  gl.viewport(0,0,FW,FH);
  rebuildFBOs();
}
addEventListener('resize',resize);

/** Apply GPU preset without touching canvas DPR (internal buffer scale only). */
function applyRenderScaleOnly(next){
  next=Math.max(0.42,Math.min(1,next));
  if(Math.abs(next-renderScale)<0.02)return;
  renderScale=next;
  rebuildFBOs();
}

function setQualityPreset(mode){
  if(mode==='perf'){maxDpr=1.25;pendingRenderScale=0.52;}
  else if(mode==='ultra'){maxDpr=2;pendingRenderScale=1;}
  else{maxDpr=2;pendingRenderScale=0.78;}
  resize();
}

// GL utils
function mkSh(type,src){
  var s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
    console.error('Shader error:',gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}
function mkProg(vs,fs){
  var v=mkSh(gl.VERTEX_SHADER,vs),f=mkSh(gl.FRAGMENT_SHADER,fs);
  if(!v||!f)return null;
  var p=gl.createProgram();gl.attachShader(p,v);gl.attachShader(p,f);gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){console.error('Link:',gl.getProgramInfoLog(p));return null;}
  gl.deleteShader(v);gl.deleteShader(f);return p;
}
var qbuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,qbuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
function mkRT(w,h){
  var t=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  var f=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
  gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  return{t:t,f:f};
}

// FBOs: 2 feedback ping-pong, 2 scene (for morph), 1 bloom
var fbA=[null,null],fbB=[null,null],fbBloom=null,fbBloomBlur=null,fbMorph=null;
var pingA=0,pingB=0;
function rebuildFBOs(){
  if(!rawW||!rawH)return;
  // renderScale controls render resolution (0.5 = half res on slow GPUs)
  FW=Math.max(1,Math.floor(rawW*renderScale));
  FH=Math.max(1,Math.floor(rawH*renderScale));
  var hw=Math.max(1,Math.floor(FW/2)), hh=Math.max(1,Math.floor(FH/2));
  for(var i=0;i<2;i++){
    if(fbA[i]){gl.deleteTexture(fbA[i].t);gl.deleteFramebuffer(fbA[i].f);}
    if(fbB[i]){gl.deleteTexture(fbB[i].t);gl.deleteFramebuffer(fbB[i].f);}
    fbA[i]=mkRT(FW,FH);
    fbB[i]=mkRT(hw,hh); // B always half-res — transition render is cheaper
  }
  [fbBloom,fbBloomBlur,fbMorph].forEach(function(r){if(r){gl.deleteTexture(r.t);gl.deleteFramebuffer(r.f);}});
  fbBloom=mkRT(hw,hh);
  fbBloomBlur=mkRT(hw,hh);
  fbMorph=mkRT(FW,FH); // dedicated full-res blend target during morph
  pingA=0;pingB=0;
}

// Audio texture (512x1: 0..255=freq, 256..511=waveform)
var atex=gl.createTexture();
var abuf=new Uint8Array(512);
(function(){
  for(var i=0;i<256;i++)abuf[256+i]=128;
  gl.bindTexture(gl.TEXTURE_2D,atex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.LUMINANCE,512,1,0,gl.LUMINANCE,gl.UNSIGNED_BYTE,abuf);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
})();

// -- AUDIO ---------------------------------------------------------
// DEMO MODE: synthetic 120BPM audio - never blank, always reacting
function demoAudio(t){
  var bph=t*2.0;
  var kick=Math.max(0,1.0-Math.abs(bph%1.0)*14);
  var snare=Math.max(0,1.0-Math.abs((bph+0.5)%1.0)*11)*0.55;
  var hihat=0.5+0.45*Math.sin(t*7.3+0.9);
  var wobble=0.5+0.5*Math.sin(t*2.2)*Math.sin(t*5.1);
  return{
    bass:0.22+0.55*Math.pow(Math.max(0,Math.sin(bph*Math.PI*2)),2.2)+kick*0.52+snare*0.12,
    mid:0.12+0.38*Math.abs(Math.sin(t*3.1))+snare*0.35+wobble*0.12,
    high:0.06+0.22*hihat+snare*0.2,
    vol:0.2+0.48*kick+0.15*snare,
    beat:Math.max(kick,snare*0.85)
  };
}

async function startMic(devId){
  try{
    if(micStream)micStream.getTracks().forEach(function(t){t.stop();});
    if(audioCtx){try{await audioCtx.close();}catch(e){}}
    audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:44100,latencyHint:'interactive'});
    if(audioCtx.state==='suspended')await audioCtx.resume();
    var c={audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}};
    if(devId&&devId!=='')c.audio.deviceId={exact:devId};
    micStream=await navigator.mediaDevices.getUserMedia(c);
    var src=audioCtx.createMediaStreamSource(micStream);
    gainNode=audioCtx.createGain();gainNode.gain.value=GAIN;
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=2048;analyser.smoothingTimeConstant=SMTH/100;
    analyser.minDecibels=-88;analyser.maxDecibels=-28;
    bufLen=analyser.frequencyBinCount;
    prevFreqFlux=new Uint8Array(bufLen);
    waveArr=new Uint8Array(bufLen);freqArr=new Uint8Array(bufLen);
    src.connect(gainNode);gainNode.connect(analyser);
    micOn=true;curDev=devId||'';
    setMicUI(true);
    document.getElementById('db').classList.add('h');
    await enumDevices();
  }catch(e){
    alert('Mic failed: '+e.message+'\n\nDemo mode will continue. Allow mic access in browser settings.');
  }
}
async function stopMic(){
  if(micStream){micStream.getTracks().forEach(function(t){t.stop();});micStream=null;}
  if(audioCtx){try{await audioCtx.close();}catch(e){}audioCtx=null;}
  analyser=null;micOn=false;prevFreqFlux=null;setMicUI(false);
  document.getElementById('db').classList.remove('h');
}
function toggleMic(){if(micOn)stopMic();else startMic(curDev);}
function setMicUI(on){
  var b=document.getElementById('micbtn'),t=document.getElementById('mictog');
  b.textContent=on?'O MIC LIVE':'O MIC OFF';
  on?b.classList.add('on'):b.classList.remove('on');
  on?t.classList.add('on'):t.classList.remove('on');
}
async function enumDevices(){
  try{
    var d=await navigator.mediaDevices.enumerateDevices();
    var s=document.getElementById('devsel');
    s.innerHTML='<option value="">Default Microphone</option>';
    d.filter(function(x){return x.kind==='audioinput';}).forEach(function(x,i){
      var o=document.createElement('option');
      o.value=x.deviceId;o.textContent=x.label||('Microphone '+(i+1));
      if(x.deviceId===curDev)o.selected=true;s.appendChild(o);
    });
  }catch(e){}
}

/** Map 0..1 energy into a punchy, show-visible drive (can exceed 1 in shaders). */
function shapeDrive(x,gain){
  x=Math.max(0,Math.min(1,x));
  x=Math.pow(x,0.68);
  return Math.min(2.05,x*gain);
}

function tickAudio(){
  var nowA=performance.now();
  var adt=Math.min(0.055,_lastAudT?((nowA-_lastAudT)/1000):0.016);
  _lastAudT=nowA;

  var s=(RCT/5)*GAIN*1.12;
  var demo=demoAudio(GT*0.5);

  if(analyser){
    analyser.smoothingTimeConstant=SMTH/100;
    analyser.getByteFrequencyData(freqArr);
    analyser.getByteTimeDomainData(waveArr);
    if(!prevFreqFlux||prevFreqFlux.length!==bufLen)prevFreqFlux=new Uint8Array(bufLen);
    var fluxRaw=0;
    for(var fi=2;fi<bufLen;fi++){
      var d=freqArr[fi]-prevFreqFlux[fi];
      if(d>0)fluxRaw+=d;
      prevFreqFlux[fi]=freqArr[fi];
    }
    var fluxN=Math.min(1,fluxRaw/(bufLen*0.42));
    sFlux+=(fluxN-sFlux)*0.52;
    var i1=Math.floor(bufLen*.02),i2=Math.floor(bufLen*.08);
    var i2b=Math.floor(bufLen*.14);
    var i3=Math.floor(bufLen*.32),i4=Math.floor(bufLen*.72);
    var sv=0,bv=0,bv2=0,mv=0,hv=0,vv=0;
    for(var i=0;i<i1;i++)sv+=freqArr[i];
    for(var i=i1;i<i2;i++)bv+=freqArr[i];
    for(var i=i2;i<i2b;i++)bv2+=freqArr[i];
    for(var i=i2;i<i3;i++)mv+=freqArr[i];
    for(var i=i3;i<i4;i++)hv+=freqArr[i];
    for(var i=0;i<i4;i++)vv+=freqArr[i];
    var cNum=0,cDen=1;
    for(var ci=i2;ci<i4;ci++){cNum+=freqArr[ci]*ci;cDen+=freqArr[ci];}
    var centN=(cNum/Math.max(1,cDen))/bufLen;
    sCent+=(centN-sCent)*0.28;
    var mb=Math.min(1,(bv/((i2-i1)*255))*s*4.2);
    mb=Math.max(mb,(bv2/((i2b-i2)*255||1))*s*2.6);
    var mm=Math.min(1,(mv/((i3-i2)*255))*s*3.5);
    var mh=Math.min(1,(hv/((i4-i3)*255))*s*3.25);
    var mv2=Math.min(1,(vv/(i4*255))*s*2.85);
    var blend=Math.min(1,mv2*2.4);
    var atk=mb-prevMbRaw;
    prevMbRaw=mb;
    if(atk>0.14&&mb>0.18)beat=Math.max(beat,0.92);
    if(atk>0.22&&mb>0.28)beat=Math.max(beat,1.12);
    sBass+=(Math.max(demo.bass*(1-blend),mb)-sBass)*.4;
    sMid +=(Math.max(demo.mid *(1-blend),mm)-sMid )*.36;
    sHigh+=(Math.max(demo.high*(1-blend),mh)-sHigh)*.34;
    sVol +=(Math.max(demo.vol *(1-blend),mv2)-sVol )*.32;
    var step=Math.floor(bufLen/256);
    for(var i=0;i<256;i++){
      var v=freqArr[i*step]||0;
      abuf[i]=Math.min(255,Math.floor(v*(1+sBass*0.35+beat*0.25)));
    }
    for(var i=0;i<256;i++)abuf[256+i]=waveArr[i*step]||128;
  } else {
    sBass+=(demo.bass-sBass)*.42;sMid+=(demo.mid-sMid)*.38;
    sHigh+=(demo.high-sHigh)*.34;sVol+=(demo.vol-sVol)*.36;
    var dKick=Math.abs(Math.sin(GT*2.*3.14159));
    sFlux+=(Math.min(1,dKick*demo.beat*1.8)-sFlux)*0.55;
    sCent+=(0.32+0.22*Math.sin(GT*0.37)+demo.mid*0.12-sCent)*0.22;
    if(demo.beat>0.65)beat=Math.max(beat,demo.beat*0.95);
    for(var i=0;i<256;i++)abuf[i]=Math.floor(Math.min(255,sBass*240*Math.exp(-i/48)+beat*40));
    for(var i=0;i<256;i++)abuf[256+i]=128+Math.floor(sMid*55*Math.sin(i*0.2+GT*3)+sHigh*35*Math.sin(i*0.37-GT*4));
  }
  gl.bindTexture(gl.TEXTURE_2D,atex);
  gl.texSubImage2D(gl.TEXTURE_2D,0,0,0,512,1,gl.LUMINANCE,gl.UNSIGNED_BYTE,abuf);

  if(sBass>0.38&&prevBass<0.26){
    var now=performance.now(),gap=now-lastBeat;
    if(gap>180&&gap<2800){
      bpmList.push(60000/gap);if(bpmList.length>8)bpmList.shift();
      var sum=0;for(var i=0;i<bpmList.length;i++)sum+=bpmList[i];
      bpm=Math.round(sum/bpmList.length);
    }
    lastBeat=now;
    beat=Math.max(beat,1.18);
  }
  prevBass=sBass;
  if(beat>0)beat=Math.max(0,beat-adt*2.65);
  if(explode>0)explode=Math.max(0,explode-adt*2.2);
}

// --- Palette: spectral centroid shifts hue; flux = transient brilliance
'vec3 pal(float t){',
'  float hue=B*.24+M*.17+H*.14+BT*.36+SC*.22+FL*.11;',
'  float tw=fract(t+T*0.0032*SP+hue+FL*.04);',
'  vec3 c;',

'  else if(PAL<2.)c=.5+.5*cos(TAU*(tw*vec3(1.,.55,.25)+vec3(.04,.18,.32)));',
'  else if(PAL<3.)c=.5+.5*cos(TAU*(tw*vec3(.55,1.,.65)+vec3(.18,.0,.12)));',
'  else if(PAL<4.)c=.5+.5*cos(TAU*(tw*vec3(1.,.15,.85)+vec3(.0,.38,.08)));',
'  else if(PAL<5.)c=.5+.5*cos(TAU*(tw*vec3(.38,.38,.38)+vec3(.28,.28,.28)));',

'  float chir=1.+M*1.12+H*1.18+FL*.45;',
'  c=(c-.5)*chir+.5;',
'  float punch=(.62+B*1.52+M*1.+H*.86+V*.65)*(1.+BT*2.65+EX*.62)*(1.+FL*.55);',
'  c+=vec3(1.)*(.04*FL+.07*BT+.03*H)*sat(punch-1.2);',
'  return c*punch;',
'}',

// --- Noise
'float h11(float n){return fract(sin(n*127.1)*43758.5);}',
'float h21(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
'float vn(vec2 p){',
'  vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);',
'  return mix(mix(h21(i),h21(i+vec2(1,0)),f.x),mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x),f.y);',
'}',
'float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*vn(p);p*=2.1;p=vec2(p.x*cos(.45)-p.y*sin(.45),p.x*sin(.45)+p.y*cos(.45));a*=.5;}return v;}',

// --- Rotation matrices
'mat2 rot2(float a){float c=cos(a),s=sin(a);return mat2(c,-s,s,c);}',
'mat3 rotX(float a){float c=cos(a),s=sin(a);return mat3(1,0,0,0,c,-s,0,s,c);}',
'mat3 rotY(float a){float c=cos(a),s=sin(a);return mat3(c,0,s,0,1,0,-s,0,c);}',
'mat3 rotZ(float a){float c=cos(a),s=sin(a);return mat3(c,-s,0,s,c,0,0,0,1);}',

// --- SDF Library (all forward-declared, no function pointers)
'float sdSph(vec3 p,float r){return length(p)-r;}',
'float sdBox(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,vec3(0.)))+min(max(q.x,max(q.y,q.z)),0.);}',
'float sdTorus(vec3 p,float R,float r){return length(vec2(length(p.xz)-R,p.y))-r;}',
'float sdCyl(vec3 p,float r,float h){vec2 d=abs(vec2(length(p.xz),p.y))-vec2(r,h);return min(max(d.x,d.y),0.)+length(max(d,vec2(0.)));}',
'float sdCap(vec3 p,vec3 a,vec3 b,float r){vec3 pa=p-a,ba=b-a;float t=sat(dot(pa,ba)/dot(ba,ba));return length(pa-ba*t)-r;}',

// --- Normal estimation (INLINE - no function pointers, WebGL1 safe)
// Usage: call nmSDF(p) where SDF is defined above it inline

// --- Lighting
'vec3 blinnPhong(vec3 n,vec3 rd,vec3 ldir,vec3 col,float amb){',
'  float d=sat(dot(n,ldir));',
'  float sh=32.-BT*10.-M*6.-FL*8.;',

'}',

'mat3 camMat(vec3 ro,vec3 ta,float roll){',
'  vec3 fwd=normalize(ta-ro);',
'  vec3 rgt=normalize(cross(vec3(sin(roll),cos(roll),0),fwd));',

'vec2 feedUV(float zoom,float rot,vec2 drift){',

].join('\n');

'}'].join('\n')},
// == 10 - STARSHIP INTERIOR - flying through a sci-fi corridor ==============
{n:'STARSHIP BRIDGE',c:'#40c4ff',fs:HEAD+[
'float sdCorr(vec3 p){',
'  // Infinite repeating corridor with sci-fi panels',
'  float z=p.z+T*SP*3.5; // fly forward',
'  float zr=mod(z,8.)-4.;',
'  // Main corridor box (inside = negative)',
'  float wall=sdBox(p,vec3(1.4,0.9,1e5))-.02;',
'  // Floor and ceiling detail panels',
'  vec3 pp=p;pp.z=zr;',
'  float panel=sdBox(pp,vec3(1.35,.88,.05+B*.03));',
'  // Glowing edge strips',
'  float strip=sdBox(pp-vec3(0.,.88,0.),vec3(1.35,.02,4.));',
'  strip=min(strip,sdBox(pp-vec3(0.,-.88,0.),vec3(1.35,.02,4.)));',
'  strip=min(strip,sdBox(pp-vec3(1.35,0.,0.),vec3(.02,.88,4.)));',
'  strip=min(strip,sdBox(pp-vec3(-1.35,0.,0.),vec3(.02,.88,4.)));',
'  // Archway ring every 8 units',
'  float arch=sdBox(vec3(abs(p.x)-1.3,abs(p.y)-.82,zr),vec3(.06,.06,.08));',
'  return min(min(-wall,strip),min(panel,arch));',
'}',
'void main(){',
'  vec2 sc=(uv-.5)*vec2(R.x/R.y,1.)*2.;float t=T*SP;',
'  // Mouse steers the ship heading',
'  vec3 ro=vec3(MX.x*.25,MX.y*.15+.05,-2.);',
'  vec3 fwd=normalize(vec3(MX.x*.08,MX.y*.05,1.));',
'  vec3 rgt=normalize(cross(vec3(0,1,0),fwd));',
'  vec3 rd=normalize(sc.x*rgt+sc.y*cross(fwd,rgt)+fwd*1.5);',
'  float td=0.;vec3 col=vec3(.01,.01,.02);',
'  for(int i=0;i<64;i++){',
'    vec3 pp=ro+rd*td;float d=sdCorr(pp);',
'    if(abs(d)<.008){',
'      vec3 e=vec3(.008,0,0);',
'      vec3 n=normalize(vec3(sdCorr(pp+e.xyy)-sdCorr(pp-e.xyy),sdCorr(pp+e.yxy)-sdCorr(pp-e.yxy),sdCorr(pp+e.yyx)-sdCorr(pp-e.yyx)));',
'      float ao=1.-float(i)/80.*.6;',
'      // Panel material: dark metal',
'      float isDark=float(abs(pp.x)<1.3&&abs(pp.y)<.86);',
'      // Strip glow: reactive to audio bands',
'      float isXStrip=float(abs(abs(pp.x)-1.35)<.04);',

'      float isArch=float(abs(pp.x)>1.25||abs(pp.y)>0.78);',

'      vec3 panelCol=vec3(.04,.05,.06)*(sat(dot(n,normalize(vec3(0,1,-1.))))*.4+.2)*ao;',
'      vec3 archCol=pal(t*.05+.5)*(1.5+B*1.5+BT*1.5);',
'      col=mix(mix(panelCol,stripCol,sat(isXStrip+isYStrip)),archCol,isArch*float(abs(zPos)<.15));',
'      col*=(1.+EX*.5);break;',
'    }',
'    if(td>20.)break;td+=max(abs(d)*.55,.007);',
'  }',
'  // Engine glow at vanishing point',
'  float engGlow=exp(-length(sc-vec2(MX.x*.08,MX.y*.05)*.5)*2.)*(B*.5+.15);',
'  col+=pal(t*.07+.3)*engGlow*(1.+BT*.8);',
'  vec2 fUV=feedUV(.998,0.,vec2(0.));',
'  col=mix(texture2D(PV,fUV).rgb*.96,col,.22+B*.18);',
'  gl_FragColor=vec4(pow(sat(col),vec3(.86)),1.);',
'}'].join('\n')},

// == 11 - WARP DRIVE - hyperspace star tunnel ================================
{n:'WARP DRIVE',c:'#7c4dff',fs:HEAD+[
'void main(){',
'  vec2 sc=(uv-.5)*vec2(R.x/R.y,1.)*2.;float t=T*SP;',
'  // Mouse tilts the warp direction',
'  vec2 center=vec2(MX.x*.3,MX.y*.25);',
'  vec2 p=sc-center;',
'  float r=length(p),a=atan(p.y,p.x);',
'  // Warp speed: bass drives how fast',
'  float speed=2.5+B*4.+BT*3.;',
'  // Star streaks: radial lines getting longer with speed',
'  float stars=0.;',
'  for(int i=0;i<64;i++){',
'    float fi=float(i);',
'    float seedA=h11(fi)*6.28318;',
'    float seedR=h11(fi+100.)*.85+.05;',
'    // Stretch along radial direction with speed',
'    float starA=seedA;',
'    float starR=seedR+mod(t*speed*.3+h11(fi+200.),1.)*2.;',
'    vec2 starPos=vec2(cos(starA),sin(starA))*starR;',
'    // Streak: capsule from star origin outward',
'    vec2 dir=normalize(starPos);',
'    float streakLen=.02+speed*.04+B*.06;',
'    vec2 a2=starPos-dir*streakLen;',
'    vec2 b2=starPos;',
'    vec2 ab=b2-a2,ap=p-a2;',
'    float tt2=sat(dot(ap,ab)/dot(ab,ab));',
'    float streakDist=length(ap-ab*tt2);',
'    float brightness=exp(-streakDist*streakDist*800.)*(1.-starR*.4);',
'    // Color by angle + time',
'    float hue=starA/6.28318+t*.04+fi*.013;',
'    stars+=brightness;',
'  }',
'  // Central warp vortex',
'  float vortex=exp(-r*r*2.)*(1.+B*.8+BT*.5);',
'  float rings=exp(-abs(r-mod(t*speed*.15,1.5))*20.)*BT*.8;',
'  // Background nebula',
'  float neb=fbm(p*2.+vec2(t*.1,-t*.08))*(1.-r*.6)*M*.5;',
'  // Compose with rich colors',
'  vec3 col=pal(a/6.28318+t*.05)*stars*(1.+B*.5);',
'  col+=pal(t*.04+.3)*vortex;',
'  col+=pal(t*.06+.6)*rings;',
'  col+=pal(neb*.5+t*.03)*(neb*.5+.1);',
'  float sc2=.992-B*.006;float rot2=0.004*SP*(1.+B*1.5);',
'  vec2 fUV=feedUV(1./sc2,rot2*(MX.x>.0?1.:-1.),vec2(center.x*.003,center.y*.003));',
'  col=mix(texture2D(PV,fUV).rgb*.97,col,.15+B*.22);',
'  col+=col*BT*.35;',
'  gl_FragColor=vec4(pow(sat(col),vec3(.87)),1.);',
'}'].join('\n')},

// == 12 - NEBULA FLYTHROUGH - volumetric 3D gas cloud ======================
{n:'NEBULA FLYTHROUGH',c:'#ff6d00',fs:HEAD+[
'// Volumetric nebula: ray march through fbm density field',
'float nebDensity(vec3 p){',
'  float d=fbm(p.xz*.4+vec2(T*SP*.04,0.));',
'  d+=fbm(p.xz*.8+vec2(-T*SP*.03,T*SP*.02))*.5;',
'  d+=fbm(p.xz*1.6+vec2(T*SP*.02,-T*SP*.03))*.25;',
'  return sat(d-.3)*(1.+B*.4);',
'}',
'void main(){',
'  vec2 sc=(uv-.5)*vec2(R.x/R.y,1.)*2.;float t=T*SP*.08;',
'  // Slow orbital camera through the cloud, mouse adds control',
'  float az=t*.25+MX.x*2.0;',
'  float el=clamp(0.2+MX.y*.6,-1.2,1.2);',
'  float camR=1.5+sin(t*.3)*.3;',
'  vec3 ro=camR*vec3(cos(el)*cos(az),sin(el),cos(el)*sin(az));',
'  ro.z+=t*.5; // also drift forward',
'  mat3 cm=camMat(ro,ro+vec3(sin(t*.2)*.3,sin(t*.15)*.2,1.),sin(t*.05)*.02);',
'  vec3 rd=cm*normalize(vec3(sc,1.5));',
'  // Ray march through density',
'  vec3 col=vec3(0.);float transmit=1.;',
'  float td=0.;',
'  for(int i=0;i<48;i++){',
'    vec3 p=ro+rd*td;',
'    float dens=nebDensity(p);',
'    if(dens>.01){',
'      // Sample color from density gradient + position + audio',
'      float hue=p.x*.15+p.y*.12+p.z*.1+t*.06+B*.3;',
'      float hue2=hue+.33+M*.2;',
'      vec3 c1=pal(hue);',
'      vec3 c2=pal(hue2);',
'      // Emission: bright filaments react to high freqs',
'      float emission=exp(-abs(dens-.5)*8.)*(H*.8+.2);',
'      vec3 emitCol=pal(hue+.1+H*.2)*(emission*3.+.1)*(1.+BT*.5);',
'      vec3 scatterCol=mix(c1,c2,dens)*dens;',
'      float stepT=.08;',
'      col+=transmit*(scatterCol*.4+emitCol*.6)*stepT*(1.+V*.3);',
'      transmit*=exp(-dens*stepT*.8);',
'      if(transmit<.01)break;',
'    }',
'    td+=.12*(1.+B*.2);',
'    if(td>6.)break;',
'  }',
'  // Stars through the cloud',
'  float stars=step(.997,h21(floor(sc*85.+floor(t*0.1))))*(transmit+.1);',
'  col+=vec3(stars)*(.8+BT*.5);',
'  // Beat flash: bright nebula emission burst',
'  col+=pal(t*.04+.5)*BT*.4*transmit;',
'  vec2 fUV=feedUV(.997,0.,vec2(sin(t*.3)*.002,cos(t*.25)*.002));',
'  col=mix(texture2D(PV,fUV).rgb*.97,col,.2+B*.15);',
'  col*=(1.+EX*.4);',
'  gl_FragColor=vec4(pow(sat(col),vec3(.88)),1.);',
'}'].join('\n')},

// == 13 - INK IN WATER - fluid sim with oil/ink swirling ===================
{n:'INK & OIL',c:'#d500f9',fs:HEAD+[
'// Ink in water: advected fbm field driven by audio',
'// Mouse stirs the fluid, audio drives injection points',
'float inkField(vec2 p,float t){',
'  // Multiple ink injection points that pulse with audio bands',
'  float v=0.;',
'  // Bass injection: large slow blobs',
'  vec2 b1=vec2(sin(t*.4+B*2.),cos(t*.35+B*1.5))*.6;',
'  v+=exp(-length(p-b1)*2.5)*B*1.4;',
'  vec2 b2=vec2(cos(t*.3+M),sin(t*.45+M*1.2))*.5;',
'  v+=exp(-length(p-b2)*2.)*M*1.2;',
'  // High freq: fine detail swirls near mouse',
'  vec2 mpos=vec2(MX.x,MX.y)*1.2;',
'  v+=exp(-length(p-mpos)*3.)*H*1.5;',
'  // Beat: sudden splash',
'  v+=exp(-length(p)*4.)*BT*1.8;',
'  return v;',
'}',
'vec2 fluidVel(vec2 p,float t){',
'  // Velocity field: curl of potential',
'  float e=.008;',
'  float f0=fbm(p*2.+vec2(t*.18,-t*.15));',
'  float fx=fbm((p+vec2(e,0.))*2.+vec2(t*.18,-t*.15));',
'  float fy=fbm((p+vec2(0.,e))*2.+vec2(t*.18,-t*.15));',
'  vec2 curl=vec2(fy-f0,-(fx-f0))/e*.5;',
'  // Add mouse stir: vortex at mouse position',
'  vec2 mpos=vec2(MX.x,MX.y)*1.2;',
'  vec2 toMouse=p-mpos;',
'  float mouseDist=length(toMouse)+.01;',
'  vec2 mouseSwirl=vec2(-toMouse.y,toMouse.x)/(mouseDist*mouseDist)*.08*(WP*.5+.1);',
'  return curl+mouseSwirl;',
'}',
'void main(){',
'  vec2 p=(uv-.5)*vec2(R.x/R.y,1.)*2.;',
'  float t=T*SP*.007;',
'  // Advect sample position backwards through velocity field',
'  vec2 vel=fluidVel(p,t);',
'  vec2 pAdv=p-vel*.18*(1.+B*.4);',
'  // Sample feedback through advected position (the core of fluid sim)',
'  vec2 fUV=sat(pAdv*.5+.5);',
'  vec4 prev=texture2D(PV,fUV);',
'  vec3 prevCol=prev.rgb;',
'  // Ink density at this position',
'  float ink=inkField(p,t);',
'  // Oil-on-water iridescence: thin film interference',
'  // Color depends on surface normal (gradient of density)',
'  float e2=.015;',
'  float dfdx=(inkField(p+vec2(e2,0.),t)-inkField(p-vec2(e2,0.),t))/(2.*e2);',
'  float dfdy=(inkField(p+vec2(0.,e2),t)-inkField(p-vec2(0.,e2),t))/(2.*e2);',
'  float thinFilm=atan(dfdy,dfdx)/6.28318+.5;',
'  float height=length(vec2(dfdx,dfdy));',
'  // Iridescent oil colors: rainbow shift based on surface angle',
'  vec3 inkCol=pal(thinFilm+t*.04+ink*.3);',
'  vec3 inkCol2=pal(thinFilm+t*.04+.33+M*.2+ink*.2);',
'  vec3 inkCol3=pal(thinFilm+t*.04+.66+H*.2);',
'  // Blend colors based on viewing angle (iridescence)',
'  vec3 oilCol=mix(mix(inkCol,inkCol2,sat(height*3.)),inkCol3,sat(height*5.-.5));',
'  // Dark water base, bright ink',
'  vec3 waterCol=vec3(.01,.015,.025);',
'  float inkAlpha=sat(ink*2.+height*.5);',
'  vec3 col=mix(waterCol,oilCol,inkAlpha);',
'  // Caustics: light through water',
'  float caustic=pow(sat(fbm(p*4.+t*.3+vel)*1.5),3.)*.3*(M+.1);',
'  col+=pal(t*.05+.25)*caustic;',
'  // Accumulate: mix with advected previous frame (fluid persistence)',
'  float decay=.978+B*.008;',
'  col=mix(col,prevCol*decay,.65-ink*.2);',
'  col+=col*BT*.3;',
'  gl_FragColor=vec4(sat(col),1.);',
'}'].join('\n')},

// == 14 - CRYSTAL STORM - 3D fractal ice crystals forming =================
{n:'CRYSTAL STORM',c:'#40c4ff',fs:HEAD+[
'float sdCrystal(vec3 p,float seed){',
'  // Each crystal is a tapered hexagonal prism',
'  float rot=seed*1.047+T*SP*.2*sin(seed*2.3);',
'  p.xz=rot2(rot)*p.xz;',
'  // Hex prism: intersection of boxes at 60 degree angles',
'  float d=sdBox(p,vec3(.08+B*.04,.6+M*.2,.08+B*.04));',
'  vec2 r1=rot2(.5236)*p.xz;d=max(d,sdBox(vec3(r1.x,p.y,r1.y),vec3(.08,.6,.08)));',
'  vec2 r2=rot2(1.0472)*p.xz;d=max(d,sdBox(vec3(r2.x,p.y,r2.y),vec3(.08,.6,.08)));',
'  // Taper: sharper tip',
'  d=max(d,length(p.xz)-.1+p.y*.1);',
'  return d;',
'}',
'float crystalField(vec3 p){',
'  float t=T*SP*.15;',
'  float dMin=1e9;',
'  for(int i=0;i<12;i++){',
'    float fi=float(i);',
'    // Crystals orbit and grow with audio',
'    float ang=fi*.524+t*(0.3+fi*.04)+B*fi*.1;',
'    float rad=.5+fi*.12+sin(t*.4+fi)*.15+BT*.1;',
'    float vert=sin(t*.3+fi*.7+M*2.)*0.4;',
'    vec3 center=vec3(cos(ang)*rad,vert,sin(ang)*rad);',
'    vec3 pp=p-center;',
'    // Point toward center (radial orientation)',
'    pp=rotY(-ang)*pp;',
'    float scale=.4+fi*.05+B*.15+sin(t*.5+fi)*.05;',
'    dMin=opU(dMin,sdCrystal(pp/scale,fi)*scale);',
'  }',
'  // Central large crystal cluster',
'  vec3 cp=p;cp.y-=sin(t*.4)*.1;',
'  dMin=opU(dMin,sdCrystal(cp,0.)*.5);',
'  dMin=opU(dMin,sdCrystal(rotY(.785)*cp,1.)*.5);',
'  dMin=opU(dMin,sdCrystal(rotY(1.57)*cp,2.)*.5);',
'  return dMin;',
'}',
'void main(){',
'  vec2 sc=(uv-.5)*vec2(R.x/R.y,1.)*2.;float t=T*SP*.15;',
'  float az=t*.22+MX.x*3.14159;',
'  float el=clamp(0.3+MX.y*.8,-1.2,1.2);',
'  float camR=3.0-B*.3;',
'  vec3 ro=camR*vec3(cos(el)*cos(az),sin(el),cos(el)*sin(az));',
'  mat3 cm=camMat(ro,vec3(0.,sin(t*.2)*.1,0.),sin(t*.06)*.02);',
'  vec3 rd=cm*normalize(vec3(sc,1.6));',
'  float td=0.;vec3 col=vec3(.01,.015,.03);',
'  for(int i=0;i<64;i++){',
'    vec3 pp=ro+rd*td;float d=crystalField(pp);',
'    if(d<.006){',
'      vec3 e=vec3(.008,0,0);',
'      vec3 n=normalize(vec3(crystalField(pp+e.xyy)-crystalField(pp-e.xyy),crystalField(pp+e.yxy)-crystalField(pp-e.yxy),crystalField(pp+e.yyx)-crystalField(pp-e.yyx)));',
'      float ao=1.-float(i)/80.*.55;',
'      // Crystal material: highly refractive, splits into spectrum',
'      vec3 ref=reflect(rd,n);',
'      float fres=pow(1.-sat(dot(-rd,n)),2.);',
'      float spec=pow(sat(dot(ref,normalize(vec3(sin(t*.5),1.5,cos(t*.4))))),32.);',
'      // Dispersion: R/G/B refract at slightly different angles',
'      float dispR=pow(sat(dot(reflect(rd,n+vec3(.01,0,0)),normalize(vec3(1,1,-1)))),16.);',
'      float dispG=pow(sat(dot(ref,normalize(vec3(.5,1,-.5)))),20.);',
'      float dispB=pow(sat(dot(reflect(rd,n-vec3(.01,0,0)),normalize(vec3(0,1,-1)))),12.);',
'      vec3 dispersion=vec3(dispR*.7,dispG*.5,dispB*.8);',
'      // Ice interior color: pale blue-white',
'      vec3 iceCol=mix(vec3(.55,.75,.9),vec3(.9,.95,1.),fres)*(sat(dot(n,normalize(vec3(0,1,-1))))*.5+.3)*ao;',
'      col=(iceCol+dispersion*1.5+vec3(spec*.6))*(1.+B*.3);',
'      col+=pal(td*.06+t*.06+B*.3)*fres*.5;',
'      col*=(1.+BT*.4+EX*.5);',
'      break;',
'    }',
'    if(td>8.)break;td+=max(d*.6,.005);',
'  }',
'  // Background: deep space blue with star particles',
'  float stars=step(.9975,h21(floor(sc*95.+t*.02)));',
'  col+=vec3(.6,.8,1.)*stars*(1.+BT*.5);',
'  // Crystal glow halos',
'  col+=pal(t*.05+.2)*exp(-length(sc)*1.8)*.05*(1.+B*.4);',
'  vec2 fUV=feedUV(1.002,0.,vec2(0.));',
'  col=mix(texture2D(PV,fUV).rgb*.97,col,.2+B*.18);',
'  gl_FragColor=vec4(pow(sat(col),vec3(.87)),1.);',
'}'].join('\n')},

// == 15 - STARSHIP WARP CORE - glowing reactor chamber with energy rings ==
{n:'WARP CORE',c:'#00e5ff',fs:HEAD+[
'float wcSDF(vec3 p){',

'void main(){',

'      float ao=1.-float(i)/80.*.55;',
'      float isCore=float(sdCyl(pp,0.18+B*.05,3.0)<.02);',
'      float isHull=float(pp.y<3.1&&pp.y>-3.1&&length(pp.xz)>.9&&length(pp.xz)<1.15);',
'      // Core: white-hot plasma glow',
'      vec3 coreCol=mix(vec3(1.,.9,.6),pal(t*.05+B*.3),sat(B*2.))*( 3.+BT*2.+B*1.5);',
'      // Rings: colored by ring index + audio reactive',
'      float ringHue=pp.y*.15+t*.06+B*.3;',
'      vec3 ringCol=pal(ringHue)*(2.5+BT*2.)*ao;',
'      float fres=pow(1.-sat(dot(-rd,n)),2.5);',
'      // Hull: dark metal with energy glow',
'      vec3 hullCol=vec3(.05,.06,.08)*(sat(dot(n,normalize(vec3(0,1,-1))))*.4+.2)*ao+pal(t*.04+.5)*fres*.4;',
'      col=mix(mix(ringCol,coreCol,isCore),hullCol,isHull*.6);',
'      col*=(1.+EX*.6+BT*.2);',
'      break;',
'    }',
'    if(td>7.)break;td+=max(d*.55,.005);',
'  }',
'  // Volumetric core glow shining outward',
'  float coreGlow=exp(-abs(length(vec2(dot(rd.xz,vec2(-ro.z,ro.x)/length(ro.xz)),0.))-0.18)*8.)*.3;',
'  col+=pal(t*.05+.2)*coreGlow*(1.5+B*1.5+BT*1.);',
'  vec2 fUV=feedUV(1.003,0.003*SP,vec2(0.));',
'  col=mix(texture2D(PV,fUV).rgb*.96,col,.22+B*.2);',
'  gl_FragColor=vec4(pow(sat(col),vec3(.87)),1.);',
'}'].join('\n')},

// == 16 - NEON GRID - tron-style infinite plane with data columns ==========
{n:'NEON GRID',c:'#39ff14',fs:HEAD+[
'float ngSDF(vec3 p){',
'  float t=T*SP*.4;',
'  // Ground grid plane',
'  float ground=p.y+0.8;',
'  // Data columns rising from grid - audio reactive height',
'  vec2 cell=floor(p.xz*0.5);',
'  vec3 cp=p;cp.xz=mod(p.xz*0.5,1.0)-0.5;cp.xz*=2.0;',
'  float beat2=texture2D(AU,vec2(sat(length(cell)*.04+.02),0.)).x;',
'  float colH=beat2*2.5*(B*.6+.2)+sin(t*.8+length(cell)*.4+cell.x*.3+cell.y*.5)*.3;',
'  float column=sdBox(cp-vec3(0.,colH*.5-0.8,0.),vec3(0.3,max(colH*.5,.01),0.3));',
'  // Floating scan line sweeping through scene',
'  float scan=abs(mod(p.y+t*1.5,4.)-2.)-.03;',
'  return min(min(ground,column),scan);',
'}',
'void main(){',
'  vec2 sc=(uv-.5)*vec2(R.x/R.y,1.)*2.;float t=T*SP*.4;',
'  // Fly over the grid, mouse steers direction',
'  vec3 ro=vec3(sin(t*.12)*1.5+MX.x*1.5,1.2+MX.y*.4,t*3.5);',
'  vec3 fwd=normalize(vec3(MX.x*.2,MX.y*.1-0.05,1.));',
'  vec3 rgt=normalize(cross(vec3(0,1,0),fwd));',
'  vec3 rd=normalize(sc.x*rgt+sc.y*cross(fwd,rgt)+fwd*1.4);',
'  float td=0.;vec3 col=vec3(.0,.02,.05);',
'  for(int i=0;i<72;i++){',
'    vec3 pp=ro+rd*td;float d=ngSDF(pp);',
'    if(abs(d)<.01){',
'      vec3 e=vec3(.01,0,0);',
'      vec3 n=normalize(vec3(ngSDF(pp+e.xyy)-ngSDF(pp-e.xyy),ngSDF(pp+e.yxy)-ngSDF(pp-e.yxy),ngSDF(pp+e.yyx)-ngSDF(pp-e.yyx)));',
'      float ao=1.-float(i)/72.*.55;',
'      bool isGround=pp.y<-0.75;',
'      bool isScan=abs(mod(pp.y+t*1.5,4.)-2.)<.06;',
'      // Grid lines on ground: bright neon edges',
'      vec2 gc=fract(pp.xz*.5);',
'      float gridLine=1.-min(min(gc.x,1.-gc.x),min(gc.y,1.-gc.y))*8.;',
'      gridLine=sat(gridLine);',
'      float freq=texture2D(AU,vec2(sat(abs(pp.x)*.05+.02),0.)).x;',
'      vec3 groundCol=vec3(.0,.02,.04)+pal(pp.x*.05+t*.04+B*.2)*gridLine*(.4+freq*.6+B*.4);',
'      // Columns: glow color based on position and audio',
'      vec3 colCol=pal(length(pp.xz)*.08+pp.y*.1+t*.05+B*.3)*(1.5+BT*.8)*ao;',
'      colCol+=pal(t*.04+.5)*pow(1.-sat(dot(-rd,n)),2.)*0.6;',
'      // Scan line: bright white sweep',
'      vec3 scanCol=pal(t*.06)*3.*(1.+BT*.8);',
'      col=isScan?scanCol:(isGround?groundCol:colCol);',
'      col*=(1.+EX*.5);break;',
'    }',
'    if(td>18.)break;td+=max(abs(d)*.55,.008);',
'  }',
'  // Horizon glow',
'  float h=exp(-abs(sc.y+0.12)*2.5)*(B*.3+.06);',
'  col+=pal(t*.04+.25)*h;',
'  vec2 fUV=feedUV(.997,0.,vec2(0.,-.0004*SP));',
'  col=mix(texture2D(PV,fUV).rgb*.95,col,.24+B*.22);',
'  gl_FragColor=vec4(pow(sat(col),vec3(.85)),1.);',
'}'].join('\n')},

// == 17 - GALAXY CORE - spiral arms with 3D star clusters orbiting =========
{n:'GALAXY CORE',c:'#ff6d00',fs:HEAD+[
'void main(){',
'  vec2 sc=(uv-.5)*vec2(R.x/R.y,1.)*2.;float t=T*SP*.007;',

'  vec3 rd=cm*normalize(vec3(sc,1.5));',
'  // Volume march through galactic disk',

'    // Disk density: exponential falloff radially and vertically',
'    float disk=exp(-r*.6)*exp(-y*4.)*(B*.3+.5);',
'    // Spiral arm density: 4 arms',
'    float armA=atan(p.z,p.x)-r*1.4-t*.25;',
'    float arm=pow(sat(cos(armA*2.)*0.5+0.5),4.)*(exp(-r*.3)*exp(-y*6.));',
'    float dens=disk*.3+arm*.9;',
'    if(dens>.01){',
'      float hue=r*.12+atan(p.z,p.x)/(3.14159*2.)+t*.04+B*.2;',
'      // Core: white-yellow; arms: blue-purple; edges: red-orange',

var _uCache={}; var _aCache={}; var _pIds=new WeakMap(); var _pId=0;
function _pid(prog){if(!_pIds.has(prog)){_pIds.set(prog,_pId++);} return _pIds.get(prog);}
function u(prog,name){
  var id=_pid(prog);
  if(!_uCache[id])_uCache[id]={};

// -- QUALITY / ADAPTIVE FPS ----------------------------------------
var adaptiveGpu=false;
var _emaFps=60;
var _adaptiveTick=0;
var morphDurationSec=1.4;
var showFpsOverlay=false;
var presentMode=false;

function readMorphSlider(){
  var el=document.getElementById('rmorph');
  if(!el)return;
  morphDurationSec=Math.max(0.55,Math.min(4.2,el.valueAsNumber*0.1));
}
readMorphSlider();

if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches){
  morphDurationSec=Math.min(morphDurationSec,0.85);
}

function tickAdaptiveFps(dt){
  if(!adaptiveGpu)return;
  _adaptiveTick+=dt;
  if(_adaptiveTick<0.75)return;
  _adaptiveTick=0;
  var q=document.getElementById('qsel');
  if(q&&q.value!=='balanced')return;
  if(_emaFps<26&&renderScale>0.48)applyRenderScaleOnly(renderScale-0.06);
  else if(_emaFps>52&&renderScale<0.92)applyRenderScaleOnly(renderScale+0.04);
}

// -- RENDER UTILITIES ----------------------------------------------
function bindQuad(prog){
  gl.bindBuffer(gl.ARRAY_BUFFER,qbuf);
  var id=_pid(prog);
  if(!_aCache[id])_aCache[id]=gl.getAttribLocation(prog,'pos');
  var l=_aCache[id];
  gl.enableVertexAttribArray(l);
  gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);
}
function setCommonUniforms(prog){
  gl.uniform2f(u(prog,'R'),FW,FH);
  gl.uniform1f(u(prog,'T'),GT*(1+sBass*0.078+beat*0.055+sFlux*0.035));
  var Bd=shapeDrive(sBass,1.84)+beat*0.48;
  gl.uniform1f(u(prog,'B'),Bd);
  gl.uniform1f(u(prog,'M'),shapeDrive(sMid,1.72));
  gl.uniform1f(u(prog,'H'),shapeDrive(sHigh,1.78));
  gl.uniform1f(u(prog,'V'),shapeDrive(sVol,1.55));
  gl.uniform1f(u(prog,'BT'),Math.min(1.48,beat*1.24));
  gl.uniform1f(u(prog,'EX'),explode);
  gl.uniform1f(u(prog,'SP'),SPD/5);gl.uniform1f(u(prog,'WP'),WRP/5);
  gl.uniform1f(u(prog,'PAL'),PAL);
  gl.uniform1f(u(prog,'FL'),Math.min(1.35,sFlux*1.18+beat*0.32));
  gl.uniform1f(u(prog,'SC'),sCent);
}
function renderScene(idx,targetFBO,prevTex,w,h){
  var prog=sceneProgs[idx];if(!prog)return;
  var rw=w||FW, rh=h||FH;
  gl.bindFramebuffer(gl.FRAMEBUFFER,targetFBO);
  gl.viewport(0,0,rw,rh);
  gl.useProgram(prog);bindQuad(prog);
  setCommonUniforms(prog);
  var mxL=u(prog,'MX');if(mxL)gl.uniform2f(mxL,mouseSmooth[0],mouseSmooth[1]);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,prevTex);
  gl.uniform1i(u(prog,'PV'),0);
  gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,atex);
  gl.uniform1i(u(prog,'AU'),1);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  presInterval=Math.max(presInterval,38);
}

function goNext(idx){
  if(morphing)return;
  nxtS=(idx!==undefined)?((idx+SCENES.length)%SCENES.length):((curS+1)%SCENES.length);
  if(nxtS===curS)nxtS=(curS+1)%SCENES.length;
  morphing=true;morphBlend=0;presTimer=0;_morphFrame=0;
  [fbB[0].f,fbB[1].f].forEach(function(f){

}
function goPrev(){goNext((curS-1+SCENES.length)%SCENES.length);}
function goRandom(){var r=Math.floor(Math.random()*SCENES.length);while(r===curS)r=Math.floor(Math.random()*SCENES.length);goNext(r);}

// -- MAIN LOOP ------------------------------------------------------
var _lastTime=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  // Guard: first call via loop() has no timestamp argument
  if(!now) now=performance.now();
  var dt=Math.min((now-_lastTime)/1000,0.05);
  if(dt<=0||dt>0.05)dt=0.016; // clamp NaN/negative
  _lastTime=now;
  // (fps tracking removed - autoScale disabled)

  GT+=dt*5*(SPD/5); frame++;
  var instFps=1/Math.max(dt,0.001);
  _emaFps+=0.15*(instFps-_emaFps);
  tickAdaptiveFps(dt);
  tickAudio();
  mouseSmooth[0]+=(mouseRaw[0]-mouseSmooth[0])*0.05;
  mouseSmooth[1]+=(mouseRaw[1]-mouseSmooth[1])*0.05;
  if(!fbA[0]||!fbB[0])return;

  if(showFpsOverlay&&hudTick%8===0){
    var el=document.getElementById('fpsBadge');
    el.textContent='FPS '+Math.round(_emaFps)+' · '+Math.round(renderScale*100)+'% · '+FW+'×'+FH;
  }

  if(autoMorph){
    presTimer+=dt;
    var rem=Math.max(0,Math.round(presInterval-presTimer));
    if(hudTick%30===0)document.getElementById('vnext').textContent=rem+'s';
    if(presTimer>=presInterval&&!morphing)goNext();
  }
  if(morphing){
    var spdBoost=Math.max(0.35,SPD/5);
    morphBlend+=dt/(morphDurationSec/spdBoost);
    _morphFrame++;
    if(morphBlend>=1){morphBlend=1;morphing=false;curS=nxtS;}
  }

  var hw=Math.max(1,Math.floor(FW/2)), hh=Math.max(1,Math.floor(FH/2));

  // Scene A: always render at full res
  renderScene(curS,fbA[1-pingA].f,fbA[pingA].t);
  pingA=1-pingA;
  var curOut=fbA[pingA].t;
  var finalTex=curOut;

  if(morphing){
    // Scene B: render at HALF RES, only on odd frames — halves GPU cost
    if(_morphFrame%2===1){
      renderScene(nxtS,fbB[1-pingB].f,fbB[pingB].t,hw,hh);
      pingB=1-pingB;
    }
    // Blend A+B → fbMorph (dedicated full-res blend target)
    gl.bindFramebuffer(gl.FRAMEBUFFER,fbMorph.f);
    gl.viewport(0,0,FW,FH);
    gl.useProgram(blendProg);bindQuad(blendProg);
    gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,curOut);
    gl.uniform1i(u(blendProg,'A'),0);
    gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,fbB[pingB].t);
    gl.uniform1i(u(blendProg,'B2'),1);
    gl.uniform1f(u(blendProg,'mix2'),morphBlend);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    finalTex=fbMorph.t;
  }

  // Bloom: threshold → blur X → blur Y
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbBloom.f);
  gl.viewport(0,0,hw,hh);
  gl.useProgram(bloomProg);bindQuad(bloomProg);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,finalTex);
  gl.uniform1i(u(bloomProg,'tex'),0);
  gl.uniform1f(u(bloomProg,'thresh'),Math.max(0.23,0.43-beat*0.29-Math.min(0.22,sBass*0.31)-Math.min(0.1,sHigh*0.07)-sFlux*0.08));
  gl.uniform1f(u(bloomProg,'BT'),Math.min(1.48,beat*1.24));
  gl.uniform1f(u(bloomProg,'B'),shapeDrive(sBass,1.84)+beat*0.48);
  gl.uniform1f(u(bloomProg,'H'),shapeDrive(sHigh,1.78));
  gl.uniform1f(u(bloomProg,'FL'),Math.min(1.2,sFlux*1.12));
  gl.uniform1f(u(bloomProg,'M'),shapeDrive(sMid,1.72));
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  gl.bindFramebuffer(gl.FRAMEBUFFER,fbBloomBlur.f);
  gl.useProgram(blurProg);bindQuad(blurProg);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fbBloom.t);
  gl.uniform1i(u(blurProg,'tex'),0);
  gl.uniform2f(u(blurProg,'dir'),1.8/hw,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  gl.bindFramebuffer(gl.FRAMEBUFFER,fbBloom.f);
  gl.useProgram(blurProg);bindQuad(blurProg);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fbBloomBlur.t);
  gl.uniform1i(u(blurProg,'tex'),0);
  gl.uniform2f(u(blurProg,'dir'),0,1.8/hh);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  // Final output: ACES + CA + grain + vignette
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.viewport(0,0,C.width,C.height);
  gl.useProgram(outProg);bindQuad(outProg);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,finalTex);
  gl.uniform1i(u(outProg,'tex'),0);
  gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,fbBloom.t);
  gl.uniform1i(u(outProg,'bloom'),1);
  gl.uniform1f(u(outProg,'BT'),Math.min(1.48,beat*1.24));
  gl.uniform1f(u(outProg,'T'),GT);
  gl.uniform1f(u(outProg,'B'),shapeDrive(sBass,1.84)+beat*0.48);
  gl.uniform1f(u(outProg,'M'),shapeDrive(sMid,1.72));
  gl.uniform1f(u(outProg,'H'),shapeDrive(sHigh,1.78));
  gl.uniform1f(u(outProg,'FL'),Math.min(1.25,sFlux*1.08+beat*0.22));
  gl.uniform2f(u(outProg,'R'),C.width,C.height);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  // HUD (every 6 frames)
  if(++hudTick%6===0){
    var bp=Math.round(sBass*100),mp=Math.round(sMid*100),hp=Math.round(sHigh*100);
    document.getElementById('mb').style.width=bp+'%';
    document.getElementById('mm').style.width=mp+'%';
    document.getElementById('mh').style.width=hp+'%';
    document.getElementById('vb').textContent=bp;
    document.getElementById('vm').textContent=mp;
    document.getElementById('vh').textContent=hp;
    document.getElementById('vbpm').textContent=bpm||'--';
    document.getElementById('lvlf').style.width=Math.round(sVol*100)+'%';
    if(!autoMorph)document.getElementById('vnext').textContent='OFF';
  }
}

// -- INIT ----------------------------------------------------------
resize();showName(0);loop();
document.addEventListener('mousemove',function(e){mouseRaw[0]=e.clientX/window.innerWidth*2-1;mouseRaw[1]=-(e.clientY/window.innerHeight*2-1);});
document.addEventListener('touchmove',function(e){e.preventDefault();var t=e.touches[0];mouseRaw[0]=t.clientX/window.innerWidth*2-1;mouseRaw[1]=-(t.clientY/window.innerHeight*2-1);},{passive:false}); // starts immediately in demo mode

// -- EVENT HANDLERS ------------------------------------------------
document.getElementById('spbtn').addEventListener('click',async function(){
  try{await startMic();}catch(e){}
  var sp=document.getElementById('splash');sp.classList.add('out');
  setTimeout(function(){sp.style.display='none';},1000);
  document.getElementById('panel').classList.remove('hide');
  showName(curS);
});
document.getElementById('micbtn').addEventListener('click',toggleMic);
document.getElementById('mictog').addEventListener('click',toggleMic);
document.getElementById('inputbtn').addEventListener('click',async function(e){
  e.stopPropagation();
  var ip=document.getElementById('ipanel');ip.classList.toggle('open');
  if(ip.classList.contains('open'))await enumDevices();
});
document.addEventListener('click',function(e){
  if(!e.target.closest('#ipanel')&&!e.target.closest('#inputbtn'))
    document.getElementById('ipanel').classList.remove('open');
});
document.getElementById('devsel').addEventListener('change',function(){
  curDev=this.value;if(micOn)startMic(this.value);
});
document.getElementById('rgain').addEventListener('input',function(){
  GAIN=this.value/100;if(gainNode)gainNode.gain.value=GAIN;
});
document.getElementById('rsmth').addEventListener('input',function(){
  SMTH=+this.value;if(analyser)analyser.smoothingTimeConstant=SMTH/100;
});
document.getElementById('prevbtn').addEventListener('click',goPrev);
document.getElementById('nextbtn').addEventListener('click',function(){goNext();});
document.getElementById('autobtn').addEventListener('click',function(){
  autoMorph=!autoMorph;this.classList.toggle('on',autoMorph);
  document.getElementById('vnext').textContent=autoMorph?'-':'OFF';
});
document.getElementById('rndbtn').addEventListener('click',goRandom);
document.getElementById('xbtn').addEventListener('click',function(){explode=1.5;beat=1.0;});
document.getElementById('rspd').addEventListener('input',function(e){SPD=+e.target.value;});
document.getElementById('rrct').addEventListener('input',function(e){RCT=+e.target.value;});
document.getElementById('rwrp').addEventListener('input',function(e){WRP=+e.target.value;});
document.querySelectorAll('.sw').forEach(function(sw){
  sw.addEventListener('click',function(){
    document.querySelectorAll('.sw').forEach(function(s){s.classList.remove('on');});
    this.classList.add('on');PAL=+this.dataset.p;
  });
});
document.getElementById('fullbtn').addEventListener('click',function(){
  document.fullscreenElement?document.exitFullscreen():
    document.documentElement.requestFullscreen().catch(function(){});
});
var uiHide=false;
document.getElementById('hidebtn').addEventListener('click',function(){
  uiHide=!uiHide;
  document.getElementById('hud').classList.toggle('hide',uiHide);
  document.getElementById('panel').classList.toggle('hide',uiHide);
});
function togglePresentMode(){
  presentMode=!presentMode;
  document.body.classList.toggle('nexus-present',presentMode);
  var b=document.getElementById('presentbtn');
  b.textContent=presentMode?'DONE':'SHOW';
  presentMode?b.classList.add('on'):b.classList.remove('on');
}
document.getElementById('presentbtn').addEventListener('click',togglePresentMode);
document.getElementById('qsel').addEventListener('change',function(){
  setQualityPreset(this.value);
  adaptiveGpu=false;
  document.getElementById('adaptbtn').classList.remove('on');
});
document.getElementById('rmorph').addEventListener('input',readMorphSlider);
document.getElementById('adaptbtn').addEventListener('click',function(){
  adaptiveGpu=!adaptiveGpu;
  this.classList.toggle('on',adaptiveGpu);
  if(adaptiveGpu&&document.getElementById('qsel').value!=='balanced'){
    document.getElementById('qsel').value='balanced';
    setQualityPreset('balanced');
  }
});
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='ArrowRight'||e.key===' '){goNext();e.preventDefault();}
  else if(e.key==='ArrowLeft')goPrev();
  else if(e.key==='r'||e.key==='R')goRandom();
  else if(e.key==='f'||e.key==='F')document.getElementById('fullbtn').click();
  else if(e.key==='h'||e.key==='H')document.getElementById('hidebtn').click();
  else if(e.key==='p'||e.key==='P')togglePresentMode();
  else if(e.code==='Backquote'){showFpsOverlay=!showFpsOverlay;document.getElementById('fpsBadge').classList.toggle('on',showFpsOverlay);}
  else if(e.key==='a'||e.key==='A')document.getElementById('autobtn').click();
  else if(e.key==='m'||e.key==='M')toggleMic();
  else if(e.key==='x'||e.key==='X'){explode=1.5;beat=1.0;}
  var n=parseInt(e.key);
  if(!isNaN(n)&&n>=1&&n<=SCENES.length)goNext(n-1);
});
</script>
